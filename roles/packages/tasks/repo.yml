---
- name: Add Git APT repo
  become: true
  ansible.builtin.deb822_repository:
    name: git-core
    uris: http://ppa.launchpad.net/git-core/ppa/ubuntu
    types: deb
    suites: "{{ ansible_distribution_release }}"
    enabled: true
    components: main
    signed_by: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xe363c90f8f1b6217
    state: present
  register: git_repo
  when: ansible_distribution == 'Ubuntu'

- name: Only run "update_cache=yes" when Git APT repo updated
  become: true
  ansible.builtin.apt:
    update_cache: true
  when:
    - ansible_distribution == 'Ubuntu'
    - git_repo.changed
